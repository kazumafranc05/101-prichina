<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>101 причина, почему ты мне так дорога | Романтический сюрприз</title>
    <style>

            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0b13 0%, #2d1a24 100%);
            font-family: 'Segoe UI', 'Quicksand', 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированные сердечки на фоне */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart-particle {
            position: absolute;
            color: rgba(255, 111, 165, 0.4);
            font-size: 20px;
            animation: floatHeart linear infinite;
            pointer-events: none;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Основной контейнер */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* Шапка */
        .header {
            text-align: center;
            padding: 40px 20px 30px;
            background: rgba(255, 220, 230, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 111, 165, 0.3);
        }

        .header h1 {
            font-size: 2rem;
            color: #ffb7d0;
            text-shadow: 0 0 15px #ff6fa5;
            letter-spacing: 2px;
        }

        .header p {
            color: #ff9ec0;
            margin-top: 12px;
            font-size: 1.1rem;
        }

        .counter {
            margin-top: 20px;
            display: inline-block;
            background: linear-gradient(135deg, #ff6fa5, #ff98b9);
            padding: 12px 28px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 1.3rem;
            box-shadow: 0 5px 20px rgba(255, 111, 165, 0.4);
        }

        /* Панель кнопок управления */
        .button-panel {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px auto;
            flex-wrap: wrap;
        }

        .control-btn {
            background: rgba(255, 111, 165, 0.85);
            backdrop-filter: blur(8px);
            border: none;
            border-radius: 50px;
            padding: 12px 28px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .control-btn:hover {
            background: #ff6fa5;
            transform: scale(1.02);
        }

        .control-btn:active {
            transform: scale(0.98);
        }

        /* Кнопка управления музыкой */
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 111, 165, 0.85);
            backdrop-filter: blur(8px);
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }

        .music-control:hover {
            background: #ff6fa5;
            transform: scale(1.02);
        }

        /* Сетка карточек */
        .reasons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 10px 0 50px;
        }

        /* Карточка */
        .reason-card {
            background: rgba(255, 245, 250, 0.95);
            backdrop-filter: blur(5px);
            border-radius: 28px;
            padding: 0;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            min-height: 140px;
            border: 1px solid rgba(255, 111, 165, 0.5);
        }

        .reason-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 35px rgba(255, 111, 165, 0.3);
            border-color: #ff6fa5;
        }

        .card-front, .card-back {
            width: 100%;
            padding: 28px 20px;
            transition: all 0.3s ease;
            border-radius: 28px;
        }

        .card-front {
            background: linear-gradient(135deg, #fff0f5, #ffe4ed);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            min-height: 140px;
        }

        .card-back {
            background: linear-gradient(135deg, #ffd9e6, #ffc0d6);
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 140px;
            color: #a13e5c;
            font-weight: 500;
            font-size: 1rem;
            line-height: 1.5;
        }

        .reason-card.opened .card-front {
            display: none;
        }

        .reason-card.opened .card-back {
            display: flex;
        }

        .card-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff6fa5;
            margin-bottom: 12px;
        }

        .card-hint {
            color: #c97a9a;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .heart-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        @media (max-width: 650px) {
            .header h1 {
                font-size: 1.4rem;
            }
            .counter {
                font-size: 1rem;
                padding: 8px 20px;
            }
            .reasons-grid {
                grid-template-columns: 1fr;
                gap: 18px;
            }
            .card-number {
                font-size: 1.8rem;
            }
            .music-control {
                bottom: 15px;
                right: 15px;
                padding: 8px 16px;
                font-size: 0.8rem;
            }
            .control-btn {
                padding: 8px 18px;
                font-size: 0.9rem;
            }
            .button-panel {
                gap: 12px;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reason-card {
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #ff9ec0;
            font-size: 0.85rem;
        }
    </style>
</head>

    const openAllBtn = document.getElementById('openAllBtn');

    const bgMusic = document.getElementById('bgMusic');

    bgMusic.volume = 0.25;

    let musicPlaying = false;

    function loadFromStorage() {
        const saved = localStorage.getItem('reasonsOpened101_v3');
        if(saved) {
            try {
                const arr = JSON.parse(saved);
                if(arr.length === 101) {
                    openedState = arr;
                }
            } catch(e) {}
        }
        updateCounter();
    }

    function saveToStorage() {
        localStorage.setItem('reasonsOpened101_v3', JSON.stringify(openedState));
    }

    function updateCounter() {
        const count = openedState.filter(v => v === true).length;
        openedCountSpan.innerText = count;
    }

    // Обновление визуального состояния всех карточек
    function updateAllCardsVisual() {
        const cards = document.querySelectorAll('.reason-card');
        cards.forEach((card, idx) => {
            if(openedState[idx]) {
                card.classList.add('opened');
            } else {
                card.classList.remove('opened');
            }
        });
    }

    // Закрыть все карточки
    function closeAllCards() {
        for(let i = 0; i < openedState.length; i++) {
            openedState[i] = false;
        }
        saveToStorage();
        updateCounter();
        updateAllCardsVisual();
    }

    // Открыть все карточки
    function openAllCards() {
        for(let i = 0; i < openedState.length; i++) {
            openedState[i] = true;
        }
        saveToStorage();
        updateCounter();
        updateAllCardsVisual();
        
        // Эффект: много сердечек при открытии всего
        for(let i = 0; i < 15; i++) {
            setTimeout(() => {
                createRandomFloatingHeart();
            }, i * 80);
        }
    }

    function createRandomFloatingHeart() {
        const heart = document.createElement('div');
        heart.className = 'heart-particle';
        heart.innerHTML = '💗';
        heart.style.left = Math.random() * window.innerWidth + 'px';
        heart.style.top = window.innerHeight - 30 + 'px';
        heart.style.position = 'fixed';
        heart.style.fontSize = (20 + Math.random() * 30) + 'px';
        heart.style.animation = 'floatHeart 1.2s ease-out forwards';
        heart.style.pointerEvents = 'none';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1200);
    }

    function toggleCard(index) {
        openedState[index] = !openedState[index];
        saveToStorage();
        updateCounter();
        
        // Обновляем конкретную карточку
        const cards = document.querySelectorAll('.reason-card');
        if(cards[index]) {
            if(openedState[index]) {
                cards[index].classList.add('opened');
                createFloatingHeartAtCard(cards[index]);
            } else {
                cards[index].classList.remove('opened');
            }
        }
    }

    function renderGrid() {
        grid.innerHTML = '';
        for(let i = 0; i < finalReasons.length; i++) {
            const card = document.createElement('div');
            card.className = 'reason-card';
            if(openedState[i]) card.classList.add('opened');
            card.setAttribute('data-index', i);
            
            const frontDiv = document.createElement('div');
            frontDiv.className = 'card-front';
            frontDiv.innerHTML = `
                <div class="heart-icon">💗</div>
                <div class="card-number">${i + 1}</div>
                <div class="card-hint">
                    <span>❤️</span> нажми, чтобы открыть <span>❤️</span>
                </div>
            `;
            
            const backDiv = document.createElement('div');
            backDiv.className = 'card-back';
            backDiv.innerHTML = `
                <div style="padding: 5px;">
                    <div style="font-size: 1.6rem; margin-bottom: 12px;">💕</div>
                    <div style="font-weight: 500;">${finalReasons[i]}</div>
                    <div style="font-size: 0.75rem; margin-top: 12px; opacity: 0.7;">✨ нажми, чтобы закрыть ✨</div>
                </div>
            `;
            
            card.appendChild(frontDiv);
            card.appendChild(backDiv);
            
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(card.getAttribute('data-index'));
                toggleCard(idx);
            });
            
            grid.appendChild(card);
            
            setTimeout(() => {
                card.style.opacity = '1';
            }, i * 12);
        }
    }
    
    function createFloatingHeartAtCard(card) {
        const rect = card.getBoundingClientRect();
        const heart = document.createElement('div');
        heart.className = 'heart-particle';
        heart.innerHTML = '💗';
        heart.style.left = rect.left + rect.width / 2 + 'px';
        heart.style.top = rect.top + rect.height / 2 + 'px';
        heart.style.position = 'fixed';
        heart.style.fontSize = '28px';
        heart.style.pointerEvents = 'none';
        heart.style.animation = 'floatHeart 1s ease-out forwards';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1000);
    }
    
    function initFloatingHearts() {
        const container = document.getElementById('floatingHearts');
        for(let i = 0; i < 50; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart-particle';
            heart.innerHTML = ['💗', '💖', '💕', '💓', '🌸', '✨', '🎵'][Math.floor(Math.random() * 7)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = 8 + Math.random() * 14 + 's';
            heart.style.animationDelay = Math.random() * 15 + 's';
            heart.style.fontSize = 14 + Math.random() * 24 + 'px';
            heart.style.opacity = 0.3 + Math.random() * 0.5;
            container.appendChild(heart);
        }
    }
    
    // Управление музыкой
    function toggleMusic() {
        if(musicPlaying) {
            bgMusic.pause();
            musicPlaying = false;
            musicStatusSpan.innerText = 'Включить музыку';
        } else {
            bgMusic.play().catch(e => {
                console.log("Автовоспроизведение заблокировано. Нажмите ещё раз.");
                musicStatusSpan.innerText = 'Нажми ещё раз';
                setTimeout(() => {
                    if(!musicPlaying) musicStatusSpan.innerText = 'Включить музыку';
                }, 1500);
            });
            musicPlaying = true;
            musicStatusSpan.innerText = 'Выключить музыку 🎵';
        }
    }
    
    bgMusic.addEventListener('error', () => {
        console.log("Файл музыки не найден. Пожалуйста, проверьте имя файла song.mp3");
    });
    
    musicToggleBtn.addEventListener('click', toggleMusic);
    closeAllBtn.addEventListener('click', closeAllCards);
    openAllBtn.addEventListener('click', openAllCards);
    
    loadFromStorage();
    renderGrid();
    initFloatingHearts();
</script>
</body>
</html>
